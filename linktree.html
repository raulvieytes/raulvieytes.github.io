---
layout: root
---

<div class="flex flex-col item-center justify-center space-y-8 h-screen">
    <img
        src="/assets/img/background.png"
        alt="Background"
        class="absolute inset-0 w-full h-full object-cover -z-10 brightness-90"
    />
    <div class="max-w-60 mx-auto space-y-6">
        <img
            src="https://images.unsplash.com/vector-1742118848550-cafc9d362a98?q=80&w=1674&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            alt="Raúl Vieytes"
            class="rounded-full size-40 object-cover mx-auto"
        />
        <h1
            class="font-yuji-boku text-4xl text-center text-white font-extrabold"
        >
            Raúl Vieytes
        </h1>
    </div>
    <ul class="space-y-4 w-full text-2xl font-medium font-inconsolata px-12">
        <li>
            <a
                href="/"
                class="flex items-center gap-4 border rounded-md px-6 py-4 w-full bg-white shadow-[5px_5px_0_rgba(0,0,0,1)]"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-scroll-text-icon lucide-scroll-text"
                >
                    <path d="M15 12h-5" />
                    <path d="M15 8h-5" />
                    <path d="M19 17V5a2 2 0 0 0-2-2H4" />
                    <path
                        d="M8 21h12a2 2 0 0 0 2-2v-1a1 1 0 0 0-1-1H11a1 1 0 0 0-1 1v1a2 2 0 1 1-4 0V5a2 2 0 1 0-4 0v2a1 1 0 0 0 1 1h3"
                    />
                </svg>
                <span>Cuentos</span>
            </a>
        </li>
        <li>
            <a
                href="/libros"
                class="flex items-center gap-4 border rounded-md px-6 py-4 w-full bg-white shadow-[5px_5px_0_rgba(0,0,0,1)]"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-book-marked-icon lucide-book-marked"
                >
                    <path d="M10 2v8l3-3 3 3V2" />
                    <path
                        d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"
                    />
                </svg>
                <span>Libros</span>
            </a>
        </li>
        <li>
            <a
                href="https://instagram.com/{{ site.instagram }}"
                target="_blank"
                class="flex items-center gap-4 border rounded-md px-6 py-4 w-full bg-white shadow-[5px_5px_0_rgba(0,0,0,1)]"
            >
                <svg
                    fill="#000000"
                    width="24"
                    height="24"
                    viewBox="4 4 24 24"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <g>
                        <path
                            d="M22.3,8.4c-0.8,0-1.4,0.6-1.4,1.4c0,0.8,0.6,1.4,1.4,1.4c0.8,0,1.4-0.6,1.4-1.4C23.7,9,23.1,8.4,22.3,8.4z"
                        />

                        <path
                            d="M16,10.2c-3.3,0-5.9,2.7-5.9,5.9s2.7,5.9,5.9,5.9s5.9-2.7,5.9-5.9S19.3,10.2,16,10.2z M16,19.9c-2.1,0-3.8-1.7-3.8-3.8c0-2.1,1.7-3.8,3.8-3.8c2.1,0,3.8,1.7,3.8,3.8C19.8,18.2,18.1,19.9,16,19.9z"
                        />

                        <path
                            d="M20.8,4h-9.5C7.2,4,4,7.2,4,11.2v9.5c0,4,3.2,7.2,7.2,7.2h9.5c4,0,7.2-3.2,7.2-7.2v-9.5C28,7.2,24.8,4,20.8,4z M25.7,20.8c0,2.7-2.2,5-5,5h-9.5c-2.7,0-5-2.2-5-5v-9.5c0-2.7,2.2-5,5-5h9.5c2.7,0,5,2.2,5,5V20.8z"
                        />
                    </g>
                </svg>
                <span>Instagram</span>
            </a>
        </li>
        <li>
            <a
                href="mailto:{{ site.email }}"
                class="flex items-center gap-4 border rounded-md px-6 py-4 w-full bg-white shadow-[5px_5px_0_rgba(0,0,0,1)]"
            >
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-mail-icon lucide-mail"
                >
                    <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7" />
                    <rect x="2" y="4" width="20" height="16" rx="2" />
                </svg>
                <span>Email</span>
            </a>
        </li>
    </ul>
</div>
