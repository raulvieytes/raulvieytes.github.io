- title: "Kelper"
  excerpt: "El libro premiado y publicado por excelencia. Aquí va la bajada o reseña principal que explica la trama de la obra, el impacto de su publicación, las menciones o premios recibidos y los detalles de su edición literaria. Un texto que invita al lector a adentrarse en su universo."
  image: "/assets/img/kelper_tapita.jpg"
  url: "/libros/kelper/"

- title: "¿A quién le importa si Belgrano era homosexual?"
  excerpt: "Aquí va cualquier fruta para rellenar el espacio de la bajada de este título tan provocador. Podemos explayarnos sobre la temática histórica, la ironía del planteo, o los hilos narrativos que recorren esta propuesta literaria singular."
  image: "/assets/img/manuel_belgrano.jpg"
  url: "/libros/belgrano/"

