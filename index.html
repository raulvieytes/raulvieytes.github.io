---
layout: default
title: Home
---

<div
    class="columns-1 gap-5 px-6 pt-6 sm:columns-3 sm:px-0 sm:pt-0 lg:columns-4"
>
    {% for post in site.posts %}
    <a href="{{ post.url }}">
        <div
            class="mb-5 break-inside-avoid-column overflow-hidden rounded-md border hover:border-orange-600"
        >
            <img src="{{ post.image }}" alt="{{ post.title }}" class="w-full" />
            <div class="mt-1 space-y-2 px-5 py-4">
                <h2 class="font-inconsolata text-xl leading-none font-bold">
                    {{ post.title }}
                </h2>
                <div class="font-roboto sm:text-sm">
                    {% assign excerpt_text = post.excerpt | strip_html |
                    strip_newlines | strip %} {% assign truncated = excerpt_text
                    | truncatewords: 30, '...' %} {{ truncated }}
                </div>
            </div>
        </div>
    </a>
    {% endfor %}
</div>
