<!-- Tu contenedor original que divide la pantalla en dos -->
<div class="p-6 flex-1 items-center grid grid-cols-1 md:grid-cols-2 align-middle gap-6 sm:gap-8">
    
    <!-- Tu foto de perfil -->
    <img
        alt="me"
        class="max-h-[70vh] ml-auto aspect-square object-cover"
        src="/assets/img/foto-raul.jpeg"
    />
    
    <!-- La tarjeta blanca para tu biografía -->

        {{ content }}
    </div>
    
</div>

  .tarjeta-blanca-texto {
    background-color: white !important;

    text-indent: 30px !important;
