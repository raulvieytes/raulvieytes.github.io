---
layout: default
permalink: /libros
---

<!-- Contenedor principal que envuelve todos tus libros (máximo 3 columnas de ancho en PC para que no se disperse) -->
<div class="max-w-4xl mx-auto px-6 py-8 space-y-16">

    {% for book in site.data.books %}
    <!-- Cada libro es una fila limpia: En PC pone el texto a la izquierda y la foto a la derecha (md:flex-row) -->
    <div class="flex flex-col md:flex-row items-center md:items-start gap-8 border-b border-gray-200 pb-12 last:border-0">
        
        <!-- Bloque Izquierdo: Título y Reseña del libro -->
        <div class="flex-1 space-y-4 text-justify md:text-left">
            <h2 class="font-inconsolata text-3xl font-bold text-gray-900 tracking-tight">
                {{ book.title }}
            </h2>
            
            <!-- El texto de avance o reseña con tipografía cómoda -->
            <div class="text-base text-gray-700 leading-relaxed font-sans">
                {{ book.excerpt }}
            </div>
            
            <!-- Un botón limpio por si en el futuro querés linkear el PDF o la compra -->
            {% if book.url %}
            <div class="pt-2">
                <a href="{{ book.url }}" target="_blank" class="inline-block font-inconsolata font-bold text-sm text-amber-900 hover:underline">
                    Ver más sobre el libro →
                </a>
            </div>
            {% endif %}
        </div>

        <!-- Bloque Derecho: La pequeña ilustración o portada -->
        <div class="w-48 sm:w-56 flex-shrink-0 order-first md:order-last">
            <div class="overflow-hidden rounded-sm shadow-md bg-white p-2 border border-gray-100">
                <img src="{{ book.image }}" alt="{{ book.title }}" class="w-full object-cover" />
            </div>
        </div>

    </div>
    {% endfor %}

</div>
