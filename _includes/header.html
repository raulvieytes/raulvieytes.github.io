<header
    class="flex items-baseline justify-between border-b px-6 py-7 sm:border-none sm:px-0"
>
    <a href="/"><h1 class="font-yuji-boku -mt-1 text-4xl">Raúl Vieytes</h1></a>
    <nav class="hidden md:block">{% include navigation.html %}</nav>
    <!-- Mobile menu button -->
    <button
        type="button"
        command="--toggle"
        commandfor="mobile-menu"
        class="md:hidden"
    >
        <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            data-slot="icon"
            aria-hidden="true"
            class="size-6 in-aria-expanded:hidden"
        >
            <path
                d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"
                stroke-linecap="round"
                stroke-linejoin="round"
            />
        </svg>
        <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            data-slot="icon"
            aria-hidden="true"
            class="size-6 not-in-aria-expanded:hidden"
        >
            <path
                d="M6 18 18 6M6 6l12 12"
                stroke-linecap="round"
                stroke-linejoin="round"
            />
        </svg>
    </button>
</header>
<el-disclosure id="mobile-menu" hidden class="block border-b p-6 md:hidden">
    {% include navigation.html %}
</el-disclosure>
